<!doctype html>
<html lang="en">

    <link rel="icon" type="image/png" href="/logo.png" />

      name="description"

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:description"
      content="إدارة منتجاتك وطلباتك بكل سهولة."

      name="twitter:image"

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "url": "https://s-collect.vercel.app/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://s-collect.vercel.app/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
